      'wax-rose': { name: 'Rose Wax Beads', category: 'Wax Beads', categoryLink: 'products.html#wax-beads', image: 'images/products/wax-rose.png', description: 'Beautiful rose-coloured wax beads.', specs: ['~100 beads per pack', 'Rose colour', 'Romantic finish', 'Premium quality'], body: '' },

      'wax-purple': { name: 'Purple Wax Beads', category: 'Wax Beads', categoryLink: 'products.html#wax-beads', image: 'images/products/wax-purple.png', description: 'Royal purple wax beads.', specs: ['~100 beads per pack', 'Royal purple', 'Distinctive look', 'Premium quality'], body: '' },

      'wax-green': { name: 'Green Wax Beads', category: 'Wax Beads', categoryLink: 'products.html#wax-beads', image: 'images/products/wax-green.png', description: 'Natural green wax beads.', specs: ['~100 beads per pack', 'Natural green', 'Botanical theme', 'Premium quality'], body: '' },
      'wax-lightpink': { name: 'Light Pink Wax Beads', category: 'Wax Beads', categoryLink: 'products.html#wax-beads', image: 'images/products/wax-lightpink.png', description: 'Soft light pink wax beads.', specs: ['~100 beads per pack', 'Light pink', 'Wedding-perfect', 'Premium quality'], body: '' },
      'wax-green-bronze': { name: 'Green Bronze Wax Beads', category: 'Wax Beads', categoryLink: 'products.html#wax-beads', image: 'images/products/wax-green-bronze.png', description: 'Metallic green bronze wax beads.', specs: ['~100 beads per pack', 'Green bronze metallic', 'Unique finish', 'Premium quality'], body: '' },

      // ===== INK & REFILLS =====
      'stamp-pad-micro': { name: 'Stamp Pad Micro - Black', category: 'Ink & Refills', categoryLink: 'products.html#ink-refills', image: 'images/products/stamp-pad-micro.png', description: 'Compact stamp pad with black ink.', specs: ['Black ink', 'Compact size', 'Felt pad', 'For rubber stamps'], body: '' },
      'colop-refill': { name: 'COLOP Refill Ink - Black', category: 'Ink & Refills', categoryLink: 'products.html#ink-refills', image: 'images/products/colop-refill.png', description: 'Refill ink for COLOP self-inking stamps. 25ml bottle.', specs: ['25ml bottle', 'Black ink', 'For COLOP stamps', 'Easy application'], body: '<h3>How to Refill</h3><p>Remove ink pad from stamp, apply 2-3 drops of ink, wait 30 minutes before use.</p>' },

    };

    const WA_NUMBER = '60167737910';

    function getProductId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id') || '';
    }

    function getWhatsAppUrl(product) {
      const msg = encodeURIComponent(`Hi, I'm interested in: ${product.name}\n\nPlease provide a quote.`);
      return `https://wa.me/${WA_NUMBER}?text=${msg}`;
    }

    function renderProduct(product) {
      const waUrl = getWhatsAppUrl(product);
      const imageHtml = product.image
        ? `<img src="${product.image}" alt="${product.name}" style="width:100%;height:100%;object-fit:contain;padding:1rem;">`
        : '';
      return `
        <nav class="product-detail__breadcrumb">
          <a href="index.html">Home</a> / <a href="products.html">Products</a> / <a href="${product.categoryLink}">${product.category}</a> / ${product.name}
        </nav>
        <div class="product-detail__grid">
          <div class="product-detail__image">${imageHtml}</div>
          <div class="product-detail__info">
            <h1>${product.name}</h1>
            <p>${product.description}</p>
            <div class="product-detail__specs">
              <h4>Specifications</h4>
              <ul>${product.specs.map(s => `<li>${s}</li>`).join('')}</ul>
            </div>
            <a href="${waUrl}" class="btn btn--primary" target="_blank" rel="noopener">
              Get Quote via WhatsApp
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </a>
          </div>
        </div>
        ${product.body ? `<div class="product-detail__body">${product.body}</div>` : ''}
      `;
    }

    function init() {
      const id = getProductId();
      const product = PRODUCTS[id];
      const container = document.getElementById('product-content');

      if (!product) {
        container.innerHTML = `
          <p>Product not found.</p>
          <p><a href="products.html">&larr; Back to Products</a></p>
        `;
        return;
      }

      document.title = `${product.name} | PolyStamp & Print Services`;
      container.innerHTML = renderProduct(product);
    }

    init();

    const header = document.getElementById('header');
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 50), { passive: true });
    const navToggle = document.getElementById('navToggle');
    navToggle?.addEventListener('click', () => document.body.classList.toggle('menu-open'));
    document.getElementById('navClose')?.addEventListener('click', () => {
      document.body.classList.remove('menu-open');
      navToggle.setAttribute('aria-expanded', 'false');
    });
    document.querySelectorAll('.nav-links a').forEach(link => link.addEventListener('click', () => document.body.classList.remove('menu-open')));
  </script>
